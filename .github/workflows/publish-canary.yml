name: Publish Canary Release

on:
  push:
    branches:
      - main

permissions:
  contents: write # Required to push the temporary canary branch
  id-token: write # Required for Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=@qozara/gdocs-schema
          npm run build --workspace=@qozara/gdocs-schema-cli

      - name: Bumping Dev Version & Pushing Canary Branch
        run: |
          VERSION="1.0.2-dev.${{ github.run_number }}"
          
          # Update version in the core package
          cd packages/core
          npm version $VERSION --no-git-tag-version
          cd ../../
          
          # Update version in the CLI package
          cd packages/cli
          npm version $VERSION --no-git-tag-version
          npm pkg set dependencies.@qozara/gdocs-schema="$VERSION"
          cd ../../

          # Commit to a detached branch to satisfy Trusted Publishing provenance
          # without polluting the main branch git history
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b canary
          git commit -am "chore: release canary $VERSION"
          git push -f origin canary

      - name: Publish Core Package
        run: |
          cd packages/core
          npm publish --provenance --access public --tag dev

      - name: Publish CLI Package
        run: |
          cd packages/cli
          npm publish --provenance --access public --tag dev
